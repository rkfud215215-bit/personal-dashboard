<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="bgLayer" class="default-bg"></div>

<div class="app">

  <aside class="sidebar glass">
    <div class="profile">
      <div class="avatar" id="avatarWrap">
        <img id="avatarImg" alt="Profile photo">
        <span id="avatarPlaceholder">🙂</span>
      </div>
      <div class="profile-name" id="profileName">Set your name</div>
    </div>

    <nav class="menu">
      <button class="menu-item active" data-section="todo">
        <span class="menu-icon">✅</span><span>To-Do List</span>
      </button>
      <button class="menu-item" data-section="habit">
        <span class="menu-icon">🪴</span><span>Habit Tracker</span>
      </button>
      <button class="menu-item" data-section="archive">
        <span class="menu-icon">🎬</span><span>Archive</span>
      </button>
      <button class="menu-item" data-section="diary">
        <span class="menu-icon">📔</span><span>Diary</span>
      </button>
      <button class="menu-item" data-section="settings">
        <span class="menu-icon">⚙️</span><span>Settings</span>
      </button>
    </nav>

    <div class="sidebar-footer">Personal Dashboard</div>
  </aside>

  <main class="content">

    <!-- TODO -->
    <section id="section-todo" class="panel glass active">
      <h2>To-Do List</h2>
      <form id="todoForm" class="inline-form">
        <input type="text" id="todoInput" placeholder="Add a task" required maxlength="200">
        <input type="date" id="todoDate">
        <button type="submit" class="btn">Add</button>
      </form>
      <div class="todo-nav">
        <button type="button" id="todoPrev" class="btn-icon" title="Previous 3 days">‹</button>
        <button type="button" id="todoToday" class="btn btn-secondary">Jump to Today</button>
        <button type="button" id="todoNext" class="btn-icon" title="Next 3 days">›</button>
      </div>
      <div id="todoDays" class="todo-days"></div>
    </section>

    <!-- HABIT -->
    <section id="section-habit" class="panel glass">
      <h2>Habit Tracker 🪴</h2>
      <form id="habitForm" class="inline-form">
        <input type="text" id="habitName" placeholder="Habit name (e.g. Drink water in the morning)" required maxlength="60">
        <input type="number" id="habitGoal" placeholder="Goal days" min="1" max="3650" required class="input-narrow">
        <button type="submit" class="btn">Add</button>
      </form>
      <div id="habitList" class="habit-grid"></div>
      <p id="habitEmpty" class="empty-msg">No habits yet. Plant one you'd like to grow 🌱</p>
    </section>

    <!-- ARCHIVE -->
    <section id="section-archive" class="panel glass">
      <h2>Archive</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="movies">🎬 Movies</button>
        <button class="tab-btn" data-tab="series">📺 Series</button>
      </div>
      <form id="archiveForm" class="archive-form">
        <div class="archive-search-row">
          <input type="text" id="archiveSearch" placeholder="Search title (TMDB)" required maxlength="120" autocomplete="off">
          <select id="archiveStatus">
            <option value="planned">Plan to Watch</option>
            <option value="watching">Watching</option>
            <option value="completed">Completed</option>
          </select>
          <select id="archiveRating">
            <option value="0">No rating</option>
            <option value="1">★☆☆☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="3">★★★☆☆</option>
            <option value="4">★★★★☆</option>
            <option value="5">★★★★★</option>
          </select>
          <button type="submit" class="btn">Add</button>
        </div>
        <input type="text" id="archiveMemo" placeholder="Notes (optional)" maxlength="300">

        <div id="archiveSelectedChip" class="archive-selected-chip">
          <img id="archiveSelectedPoster" alt="">
          <span id="archiveSelectedLabel"></span>
          <button type="button" id="archiveSelectedClear" class="btn-icon" title="Clear selection">✕</button>
        </div>

        <p id="archiveSearchStatus" class="archive-search-status"></p>
        <div id="archiveResults" class="archive-results"></div>
      </form>
      <div id="archiveList" class="archive-grid"></div>
      <p id="archiveEmpty" class="empty-msg"></p>
    </section>

    <!-- DIARY -->
    <section id="section-diary" class="panel glass">
      <h2>Diary</h2>
      <form id="diaryForm" class="inline-form diary-form">
        <div class="diary-form-row">
          <label class="file-label">
            📷 Choose Photo
            <input type="file" id="diaryFile" accept="image/*">
          </label>
          <input type="text" id="diaryUrl" placeholder="Or enter an image URL">
          <input type="date" id="diaryDate">
        </div>
        <textarea id="diaryText" placeholder="Write about your day" required maxlength="500"></textarea>
        <button type="submit" class="btn">Add Entry</button>
      </form>
      <div id="diaryGrid" class="diary-grid"></div>
      <p id="diaryEmpty" class="empty-msg">No entries yet. Capture today's moment 📸</p>
    </section>

    <!-- SETTINGS -->
    <section id="section-settings" class="panel glass">
      <h2>Settings</h2>

      <div class="settings-block">
        <h3>My Name</h3>
        <input type="text" id="settingName" placeholder="Enter your name" maxlength="30">
      </div>

      <div class="settings-block">
        <h3>Background Photo</h3>
        <div class="settings-row">
          <label class="file-label">
            🖼️ Upload File
            <input type="file" id="settingBgFile" accept="image/*">
          </label>
          <input type="text" id="settingBgUrl" placeholder="Enter image URL and press Enter">
          <button type="button" id="settingBgReset" class="btn btn-secondary">Reset to Default Background</button>
        </div>
      </div>

      <div class="settings-block">
        <h3>Profile Photo</h3>
        <label class="file-label">
          📤 Upload Photo
          <input type="file" id="settingAvatarFile" accept="image/*">
        </label>
        <div class="avatar-editor" id="avatarEditorWrap">
          <div class="avatar-preview-frame" id="avatarPreviewFrame">
            <img id="avatarPreviewImg" alt="Profile preview" draggable="false">
          </div>
          <div class="avatar-controls">
            <p class="avatar-hint">Drag the photo to adjust its position</p>
            <label>Zoom
              <input type="range" id="avatarZoom" min="100" max="300" value="100">
            </label>
            <button type="button" id="avatarPosReset" class="btn btn-secondary">Reset Position</button>
          </div>
        </div>
      </div>
    </section>

  </main>
</div>

<script src="js/script.js"></script>
</body>
</html>
